<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TETRIS GAME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="side-panel left-panel">
            <div class="panel-box">
                <h2>HOLD</h2>
                <canvas id="hold-canvas" width="120" height="120"></canvas>
            </div>
            
            <div class="panel-box score-box">
                <h2>SCORE</h2>
                <div id="score-val" class="counter-val">0</div>
            </div>

            <div class="panel-box lines-box">
                <h2>LINES</h2>
                <div id="lines-val" class="counter-val">0</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="game-canvas" width="300" height="600"></canvas>
            
            <div id="effect-overlay"></div>

            <div id="pause-screen" class="modal-overlay" style="display: flex;">
                <div class="modal-content">
                    <h1>PAUSED</h1>
                    <p>コントローラーのSTARTボタンか<br>画面のボタンで再開します</p>
                    <button class="modal-btn" onclick="togglePause()">RESUME</button>
                </div>
            </div>

            <div id="game-over-screen" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h1>GAME OVER</h1>
                    <p>FINAL SCORE: <span id="final-score">0</span></p>
                    <button class="modal-btn" onclick="resetGame()">TRY AGAIN</button>
                </div>
            </div>
        </div>

        <div class="side-panel right-panel">
            <div class="panel-box">
                <h2>NEXT</h2>
                <canvas id="next-canvas" width="120" height="400"></canvas>
            </div>

            <div class="panel-box timer-box">
                <h2>TIME</h2>
                <div id="timer-val" class="counter-val">00:00</div>
            </div>

            <div class="panel-box speed-box">
                <h2>SPEED</h2>
                <div id="speed-val" class="counter-val">Lv.1</div>
            </div>

            <div class="controls-panel">
                <button id="start-btn" class="sys-btn" onclick="togglePause()">PAUSE</button>
                <button id="reset-btn" class="sys-btn" onclick="resetGame()">RESET</button>
                <button id="fullscreen-btn" class="sys-btn" onclick="toggleFullscreen()">FULL (F)</button>
                <button id="config-open-btn" class="sys-btn" onclick="document.getElementById('config-screen').style.display='flex'">KEYS</button>
            </div>
        </div>
    </div>

    <div id="config-screen" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 90%; max-width: 500px;">
            <h1>KEY CONFIG</h1>
            <p>設定したいボタンを押してから、キーボードのキーまたはゲームパッドのボタンを入力してください。</p>
            
            <div class="config-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ACTION</th>
                            <th>KEYBOARD</th>
                            <th>GAMEPAD</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>左移動 (Left)</td>
                            <td><button id="cfg-kb-moveLeft" class="key-btn text-left" onclick="startConfig('moveLeft','kb')">ArrowLeft</button></td>
                            <td><button id="cfg-gp-moveLeft" class="key-btn" onclick="startConfig('moveLeft','gp')">B14, LX-</button></td>
                        </tr>
                        <tr>
                            <td>右移動 (Right)</td>
                            <td><button id="cfg-kb-moveRight" class="key-btn text-left" onclick="startConfig('moveRight','kb')">ArrowRight</button></td>
                            <td><button id="cfg-gp-moveRight" class="key-btn" onclick="startConfig('moveRight','gp')">B15, LX+</button></td>
                        </tr>
                        <tr>
                            <td>ソフトドロップ</td>
                            <td><button id="cfg-kb-softDrop" class="key-btn text-left" onclick="startConfig('softDrop','kb')">ArrowDown</button></td>
                            <td><button id="cfg-gp-softDrop" class="key-btn" onclick="startConfig('softDrop','gp')">B13, LY+</button></td>
                        </tr>
                        <tr>
                            <td>ハードドロップ</td>
                            <td><button id="cfg-kb-hardDrop" class="key-btn text-left" onclick="startConfig('hardDrop','kb')">ArrowUp</button></td>
                            <td><button id="cfg-gp-hardDrop" class="key-btn" onclick="startConfig('hardDrop','gp')">B12</button></td>
                        </tr>
                        <tr>
                            <td>右回転 (Clockwise)</td>
                            <td><button id="cfg-kb-rotRight" class="key-btn text-left" onclick="startConfig('rotRight','kb')">KeyX</button></td>
                            <td><button id="cfg-gp-rotRight" class="key-btn" onclick="startConfig('rotRight','gp')">B1</button></td>
                        </tr>
                        <tr>
                            <td>左回転 (Counter-CW)</td>
                            <td><button id="cfg-kb-rotLeft" class="key-btn text-left" onclick="startConfig('rotLeft','kb')">KeyZ</button></td>
                            <td><button id="cfg-gp-rotLeft" class="key-btn" onclick="startConfig('rotLeft','gp')">B0</button></td>
                        </tr>
                        <tr>
                            <td>ホールド (Hold)</td>
                            <td><button id="cfg-kb-hold" class="key-btn text-left" onclick="startConfig('hold','kb')">KeyC</button></td>
                            <td><button id="cfg-gp-hold" class="key-btn" onclick="startConfig('hold','gp')">B4, B5</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="config-footer">
                <button class="sys-btn reset-cfg-btn" onclick="clearAllKeyConfigs()">RESET ALL</button>
                <button class="sys-btn close-cfg-btn" onclick="document.getElementById('config-screen').style.display='none'">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
